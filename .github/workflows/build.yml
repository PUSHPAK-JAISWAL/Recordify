name: Build Recordify App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ✅ Use Node 20 (matches your project)
      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ Fix Python issue (distutils)
      - name: 🐍 Fix Python for node-gyp
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools

      # ❗ CRITICAL: Skip postinstall
      - name: 📦 Install Dependencies (SAFE)
        run: npm install --legacy-peer-deps --ignore-scripts

      # ✅ Install correct rebuild tool temporarily
      - name: 🔧 Install compatible rebuild
        run: npm install @electron/rebuild@3.6.0 --no-save

      # ✅ Rebuild native module manually
      - name: 🔨 Rebuild Native Modules
        run: npx electron-rebuild -f -w uiohook-napi

      # ✅ Build (ignore native helper failures if any)
      - name: 🏗️ Build App
        run: npm run build
        continue-on-error: true

      # ✅ Package
      - name: 📦 Package App
        run: npx electron-builder --win

      # ✅ Upload
      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: recordify-build
          path: dist/**